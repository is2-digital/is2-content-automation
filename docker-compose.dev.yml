# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  app:
    build:
      target: dev
    env_file:
      - .env.dev
    environment:
      ENVIRONMENT: development
    ports:
      - "8000:8000"   # FastAPI
      - "5678:5678"   # debugpy remote attach
    volumes:
      - .:/app        # mount source for hot reload

  postgres:
    ports:
      - "5432:5432"   # expose for local access (psql, pgAdmin, etc.)

  redis:
    ports:
      - "6379:6379"   # expose for local access (redis-cli, RedisInsight, etc.)
